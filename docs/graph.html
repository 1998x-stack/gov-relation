// ── BUILD NETWORK ──
(function() {
  if (typeof vis === 'undefined') {
    var fb = document.querySelector('#graph .fallback-msg');
    if (fb) fb.textContent = 'vis.js CDN 加载失败，请检查网络或刷新重试。';
    return;
  }

  var container = document.getElementById('graph');
  var fb = container.querySelector('.fallback-msg');
  if (fb) fb.classList.add('hidden');

  var dsNodes = new vis.DataSet(nodes);
  var dsEdges = new vis.DataSet(edges);
  var data = {nodes: dsNodes, edges: dsEdges};
  var options = {
    physics: {
      solver: "forceAtlas2Based",
      forceAtlas2Based: {gravitationalConstant: -40, centralGravity: 0.01, springLength: 160, springConstant: 0.04},
      stabilization: {iterations: 200},
    },
    interaction: {hover: true, tooltipDelay: 150, zoomView: true, dragView: true},
    layout: {improvedLayout: true},
  };

  var network = new vis.Network(container, data, options);

  // Click tooltip
  var tooltip = document.getElementById('tooltip');
  network.on('click', function(params) {
    if (params.nodes.length === 1) {
      var nodeId = params.nodes[0];
      var node = nodes.find(function(n) { return n.id === nodeId; });
      if (node && node.personData) {
        var p = node.personData;
        tooltip.innerHTML =
          '<div class="name">' + p.label + '</div>' +
          '<div class="role">' + p.title + '</div>' +
          '<div class="detail">' +
          (p.born ? '出生: ' + p.born : '') + (p.place ? ' · ' + p.place : '') + '<br>' +
          p.detail +
          '</div>';
        tooltip.style.display = 'block';
      } else if (node && !node.personData) {
        tooltip.innerHTML = '<div class="name">' + node.label + '</div><div class="role">机构/单位</div>';
        tooltip.style.display = 'block';
      }
    } else {
      tooltip.style.display = 'none';
    }
  });

  network.once('stabilizationIterationsDone', function() {
    network.fit({animation: true});
  });
})();
